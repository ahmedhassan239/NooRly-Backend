<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset your password – NooRly</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; margin: 0; padding: 1.5rem; min-height: 100vh; background: #f8fafc; color: #1e293b; }
    .card { max-width: 420px; margin: 0 auto; background: #fff; padding: 1.75rem; border-radius: 16px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
    h1 { margin: 0 0 0.5rem; font-size: 1.35rem; }
    .sub { color: #64748b; font-size: 0.9rem; margin-bottom: 1.25rem; }
    .btn { display: inline-block; width: 100%; padding: 14px 20px; background: #0f766e; color: #fff; border: none; border-radius: 10px; font-size: 1rem; font-weight: 600; text-align: center; text-decoration: none; cursor: pointer; margin-bottom: 0.75rem; }
    .btn:hover { background: #0d9488; }
    .row { display: flex; gap: 0.5rem; margin-bottom: 0.75rem; }
    .row input { flex: 1; padding: 10px 12px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 0.875rem; }
    .copy-btn { padding: 10px 16px; background: #e2e8f0; border: none; border-radius: 8px; font-size: 0.875rem; cursor: pointer; white-space: nowrap; }
    .copy-btn:hover { background: #cbd5e1; }
    .label { font-size: 0.75rem; color: #64748b; margin-bottom: 0.25rem; }
    .hidden { display: none; }
    .try-open { color: #64748b; font-size: 0.85rem; margin-top: 1rem; }
  </style>
</head>
<body>
  <div class="card" id="card">
    <h1>Reset your password</h1>
    <p class="sub" id="sub">Opening the NooRly app…</p>
    <a href="#" class="btn hidden" id="openBtn">Open NooRly App</a>
    <div class="hidden" id="fallback">
      <div class="label">Email</div>
      <div class="row">
        <input type="text" id="email" readonly>
        <button type="button" class="copy-btn" id="copyEmail">Copy</button>
      </div>
      <div class="label">Token (from link)</div>
      <div class="row">
        <input type="text" id="token" readonly>
        <button type="button" class="copy-btn" id="copyToken">Copy</button>
      </div>
      <a href="#" class="btn" id="openBtn2">Open NooRly App</a>
      <p class="try-open">If the app didn’t open, tap the button above or copy the token and open the app manually.</p>
    </div>
  </div>
  <script>
    (function() {
      var params = new URLSearchParams(window.location.search);
      var email = params.get('email') || '';
      var token = params.get('token') || '';
      var decodedEmail = decodeURIComponent(email);
      var appUrl = 'noorly://reset-password?token=' + encodeURIComponent(token) + '&email=' + encodeURIComponent(email);

      document.getElementById('email').value = decodedEmail;
      document.getElementById('token').value = token;
      document.getElementById('openBtn').href = appUrl;
      document.getElementById('openBtn2').href = appUrl;

      function showFallback() {
        document.getElementById('sub').textContent = 'Open the NooRly app to reset your password.';
        document.getElementById('openBtn').classList.remove('hidden');
        document.getElementById('fallback').classList.remove('hidden');
      }

      document.getElementById('openBtn').onclick = document.getElementById('openBtn2').onclick = function(e) {
        window.location.href = appUrl;
        e.preventDefault();
      };

      document.getElementById('copyEmail').onclick = function() {
        navigator.clipboard.writeText(decodedEmail).then(function() { alert('Email copied'); });
      };
      document.getElementById('copyToken').onclick = function() {
        navigator.clipboard.writeText(token).then(function() { alert('Token copied'); });
      };

      setTimeout(function() {
        window.location.href = appUrl;
      }, 200);

      setTimeout(showFallback, 600);
    })();
  </script>
</body>
</html>
